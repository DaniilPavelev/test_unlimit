spring.application.name=pavelev

spring.datasource.url=jdbc:postgresql://localhost:5432/pavelev
spring.datasource.username=pavelev
spring.datasource.password=pavelev

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.flyway.enabled=true

# LLM client (stub by default; set llm.mode=http for real calls)
llm.mode=stub
llm.base-url=http://localhost:8081
llm.api-key=
llm.model=incident-analyzer-v1
llm.max-attempts=2
llm.connect-timeout=5s
llm.read-timeout=30s

# Bounded historical memory for LLM context
memory.retrieval.max-incidents=5
memory.retrieval.max-aggregate-memories=2
memory.retrieval.max-context-characters=6000
memory.retrieval.lookback-days=180
memory.retrieval.recent-bonus=1.0
memory.retrieval.recent-days=14

# Long-term aggregate compaction
memory.compaction.enabled=true
memory.compaction.batch-size=50
memory.compaction.minimum-pending=10
memory.compaction.cron=0 0 2 * * *
memory.compaction.max-source-items-per-run=200

# History API
incident.history.max-page-size=100
incident.history.default-page-size=20
